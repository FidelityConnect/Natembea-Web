<footer id="contact" class="bg-navyDeep text-cream py-16">
  <div class="max-w-7xl mx-auto px-4 grid grid-cols-1 md:grid-cols-3 gap-12">
    <div>
      <h3 class="text-2xl font-serif font-bold text-gold mb-6">{{ .Site.Data.site.brand.name }}</h3>
      <p class="text-gray-400 mb-6">{{ .Site.Data.site.about.mission }}</p>
    </div>
    <div>
      <h4 class="text-lg font-bold mb-6">Contact Us</h4>
      <ul class="space-y-4 text-gray-400">
        {{ range .Site.Data.site.contact.details }}
        <li class="flex items-start gap-3">
          <span>{{ .icon }}</span>
          <span class="whitespace-pre-line">{{ .val }}</span>
        </li>
        {{ end }}
      </ul>
    </div>
    <div>
      <h4 class="text-lg font-bold mb-6">Follow Us</h4>
      <div class="flex gap-4">
        <a href="{{ .Site.Data.site.brand.social.instagram }}" class="text-gray-400 hover:text-gold transition text-2xl">📸</a>
        <a href="{{ .Site.Data.site.brand.social.twitter }}" class="text-gray-400 hover:text-gold transition text-2xl">🐦</a>
      </div>
    </div>
  </div>
  <div class="border-t border-gray-800 mt-12 pt-8 text-center text-gray-500 text-sm">
    &copy; {{ now.Year }} {{ .Site.Data.site.brand.name }}. All rights reserved.
  </div>
</footer>
